<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speedy Alphabet</title>
  <style>
    :root{
      --sky1:#c8f4ff;
      --sky2:#f8fdff;
      --panel:#80d7ee;
      --panelDark:#65c5df;
      --blue:#5268bd;
      --blue2:#6f83dd;
      --pink:#ff7fa1;
      --cream:#fffdf4;
      --keyborder:#bdebf5;
      --text:#ffffff;
      --character:url("https://raw.githubusercontent.com/LuissForce/Dictionary/main/character.png");
      --planet:url("https://raw.githubusercontent.com/LuissForce/Dictionary/main/planet.png");
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,var(--sky1),var(--sky2));
      color:var(--text);
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* Top bar */
    .topbar{
      height:64px;
      background:linear-gradient(180deg,#91e2f4,var(--panel));
      border-bottom:4px solid var(--panelDark);
      position:relative;
      display:flex;
      align-items:center;
      padding:0 10px;
      box-shadow:0 3px 10px rgba(58,132,160,.18);
      z-index:5;
    }

    #pauseBtn,
    #restartBtn{
      display:none;
    }

    .iconBtn{
      width:44px;
      height:44px;
      border-radius:10px;
      border:0;
      background:transparent;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .iconBtn:active{ transform:scale(.98); }

    .timer{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      font-size:29px;
      font-weight:800;
      font-variant-numeric: tabular-nums;
      letter-spacing:.5px;
      color:white;
      pointer-events:none;
      text-shadow:0 2px 4px rgba(55,104,135,.25);
    }

    /* Main letter area */
    .stage{
      flex:1;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 24%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 65% 70%, rgba(255,255,255,.7) 0 2px, transparent 3px),
        linear-gradient(180deg,#d8f8ff,#fbfeff);
      padding:16px;
      user-select:none;
      overflow:hidden;
    }

    .stage::before{
      content:"";
      position:absolute;
      width:min(54vw, 390px);
      aspect-ratio:1/1;
      right:7%;
      top:9%;
      background:var(--planet) center/contain no-repeat;
      opacity:.34;
      filter:drop-shadow(0 12px 20px rgba(82,104,189,.12));
      animation:planetFloat 7s ease-in-out infinite;
      z-index:0;
    }

    .stage::after{
      content:"";
      position:absolute;
      width:min(32vw, 230px);
      aspect-ratio:1/1;
      left:4%;
      bottom:-8px;
      background:var(--character) center/contain no-repeat;
      filter:drop-shadow(0 10px 16px rgba(48,94,132,.18));
      animation:mascotFloat 3.8s ease-in-out infinite;
      z-index:1;
      pointer-events:none;
    }

    .letter{
      position:relative;
      z-index:2;
      font-size:128px;
      font-weight:800;
      line-height:1;
      letter-spacing:2px;
      color:var(--blue);
      text-shadow:
        0 5px 0 rgba(255,255,255,.95),
        0 0 18px rgba(82,104,189,.18);
      animation:letterPop .18s ease-out;
    }

    /* Keyboard */
    .keyboardWrap{
      padding:14px 10px 22px;
      background:linear-gradient(180deg,#e4f9ff,#d4f3fb);
      border-top:4px solid #bdebf5;
      box-shadow:0 -5px 18px rgba(74,147,175,.12);
      z-index:4;
    }

    .keyboard{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .row{
      display:flex;
      justify-content:center;
      gap:10px;
    }

    .key{
      min-width:44px;
      height:44px;
      padding:0 10px;
      border-radius:10px;
      border:2px solid var(--keyborder);
      background:var(--cream);
      color:var(--blue);
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 3px 0 #afdfee, 0 4px 8px rgba(67,126,160,.10);
    }
    .key:active{ transform:translateY(2px); box-shadow:0 1px 0 #afdfee; }
    .key.good{ outline:3px solid rgba(91,210,129,.45); background:#d6ffdc; }
    .key.bad{ outline:3px solid rgba(255,109,143,.55); background:#ffe0e7; }

    .hint{
      text-align:center;
      color:#5d8ea2;
      font-size:12px;
      font-weight:700;
      margin-top:10px;
    }

    #hiddenInput{
      position:absolute;
      left:-9999px;
      top:-9999px;
      opacity:0;
    }

    /* Finish modal */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(71,112,144,.38);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
      backdrop-filter:blur(3px);
    }
    .modal{
      width:min(420px, 92vw);
      position:relative;
      overflow:hidden;
      background:#fffdf9;
      color:#24305e;
      border:4px solid #91e2f4;
      border-radius:26px;
      padding:22px 18px 18px;
      box-shadow:0 14px 34px rgba(61,116,151,.28);
      text-align:center;
    }
    .modal::before{
      content:"";
      position:absolute;
      width:92px;
      height:92px;
      left:-12px;
      bottom:-14px;
      background:var(--character) center/contain no-repeat;
      opacity:.95;
    }
    .modal h2{
      margin:0 0 8px;
      font-size:22px;
      color:var(--blue);
    }
    .scoreBig{
      font-size:40px;
      font-weight:900;
      font-variant-numeric: tabular-nums;
      margin:6px 0 14px;
      color:#ff6f98;
      text-shadow:0 2px 0 #fff;
    }
    .modal .sub{ color:#5d6d9f; font-size:13px; margin-bottom:14px; }
    .modalBtn{
      width:100%;
      padding:13px 14px;
      border-radius:16px;
      border:0;
      background:linear-gradient(180deg,#ff8cad,#ff6f98);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 4px 0 #df5b7d;
    }
    .modalBtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #df5b7d; }

    @keyframes mascotFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }
    @keyframes planetFloat{
      0%,100%{ transform:translateY(0) rotate(-2deg); }
      50%{ transform:translateY(8px) rotate(2deg); }
    }
    @keyframes letterPop{
      from{ transform:scale(.92); opacity:.7; }
      to{ transform:scale(1); opacity:1; }
    }

    @media (max-width:520px){
      .letter{ font-size:96px; }
      .timer{ font-size:24px; }
      .key{ min-width:36px; height:40px; font-size:16px; border-radius:9px; }
      .topbar{ height:58px; }
      .stage::before{ width:290px; right:-28px; top:42px; opacity:.27; }
      .stage::after{ width:150px; left:2%; bottom:-6px; }
      .hint{ font-size:11px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="iconBtn" id="restartBtn" aria-label="Restart" title="Restart">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 6a6 6 0 1 1-5.657 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M7 6v4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="timer" id="timer">0:00.00</div>

    <button class="iconBtn" id="pauseBtn" aria-label="Pause" title="Pause">
      <svg id="pauseIcon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M17 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
        <path d="M8 5l11 7-11 7V5z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="stage" id="stage">
    <div class="letter" id="letter">A</div>
  </div>

  <div class="keyboardWrap">
    <div class="keyboard" id="keyboard"></div>
    <div class="hint">Tip: You can tap the keys or use your real keyboard.</div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="finishTitle">
    <div class="modal">
      <h2 id="finishTitle">Great job!</h2>
      <div class="scoreBig" id="finalTime">0:00.00</div>
      <div class="sub">Your alphabet time</div>
      <button class="modalBtn" id="tryAgainBtn">Try again</button>
    </div>
  </div>

  <input id="hiddenInput" autocomplete="off" spellcheck="false" />

<script>
(() => {
  const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const STORAGE_KEY = "alphabet_typing_scores_v2";

  const timerEl = document.getElementById("timer");
  const letterEl = document.getElementById("letter");
  const keyboardEl = document.getElementById("keyboard");
  const restartBtn = document.getElementById("restartBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const pauseIcon = document.getElementById("pauseIcon");
  const playIcon = document.getElementById("playIcon");
  const hiddenInput = document.getElementById("hiddenInput");

  const overlay = document.getElementById("overlay");
  const finalTimeEl = document.getElementById("finalTime");
  const tryAgainBtn = document.getElementById("tryAgainBtn");

  const LAYOUT = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ZXCVBNM"
  ];

  let index = 0;
  let running = false;
  let paused = false;

  let startTime = 0;
  let pausedAt = 0;
  let pauseTotal = 0;
  let rafId = null;

  function loadScores(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const scores = raw ? JSON.parse(raw) : [];
      return Array.isArray(scores) ? scores : [];
    }catch{ return []; }
  }
  function saveScore(seconds){
    const scores = loadScores();
    scores.push(seconds);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
  }

  function formatTime(sec){
    const m = Math.floor(sec / 60);
    const s = sec - (m * 60);
    const s2 = s.toFixed(2).padStart(5, "0");
    return `${m}:${s2}`;
  }

  function currentElapsed(){
    if (!running) return 0;
    const now = performance.now();
    const t = (now - startTime - pauseTotal) / 1000;
    return Math.max(0, t);
  }

  function setLetter(){
    letterEl.textContent = ALPHABET[index] ?? "✓";
    letterEl.style.animation = "none";
    letterEl.offsetHeight;
    letterEl.style.animation = "letterPop .18s ease-out";
  }

  function stopTick(){
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function tick(){
    if (!running || paused) return;
    timerEl.textContent = formatTime(currentElapsed());
    rafId = requestAnimationFrame(tick);
  }

  function resetKeyHighlights(){
    document.querySelectorAll('.key').forEach(k => k.classList.remove('good','bad'));
  }

  function start(){
    index = 0;
    running = true;
    paused = false;
    pauseTotal = 0;
    startTime = 0; // will be set on first correct A
    timerEl.textContent = "0:00.00";
    setLetter();
    setPauseIcon(false);
    resetKeyHighlights();
    stopTick();
    hiddenInput.focus();
  }

  function finish(){
    // compute elapsed BEFORE flipping running=false
    const t = startTime
      ? Math.max(0, ((performance.now() - startTime - pauseTotal) / 1000))
      : 0;

    running = false;
    paused = false;
    stopTick();

    const t2 = parseFloat(t.toFixed(2));
    timerEl.textContent = formatTime(t2);
    saveScore(t2);

    // show popup
    finalTimeEl.textContent = formatTime(t2);
    overlay.style.display = "flex";

    setPauseIcon(true); // show play (like stopped)
  }

  function setPauseIcon(isPlay){
    pauseIcon.style.display = isPlay ? "none" : "block";
    playIcon.style.display = isPlay ? "block" : "none";
  }

  function togglePause(){
    if (!running) {
      start();
      return;
    }
    paused = !paused;
    if (paused) {
      pausedAt = performance.now();
      setPauseIcon(true);
      stopTick();
    } else {
      pauseTotal += performance.now() - pausedAt;
      setPauseIcon(false);
      stopTick();
      rafId = requestAnimationFrame(tick);
      hiddenInput.focus();
    }
  }

  function handleChar(ch){
    if (!running) start();
    if (paused) return;

    const key = ch.toUpperCase();
    if (!/^[A-Z]$/.test(key)) return;

    const expected = ALPHABET[index];
    const btn = document.querySelector(`button.key[data-k="${key}"]`);

    if (key === expected) {
      // start timer ONLY when A is typed
      if (index === 0 && startTime === 0) {
        startTime = performance.now();
        stopTick();
        rafId = requestAnimationFrame(tick);
      }

      if (btn) { btn.classList.add('good'); setTimeout(() => btn.classList.remove('good'), 140); }
      index++;
      setLetter();
      if (index >= ALPHABET.length) finish();
    } else {
      if (btn) { btn.classList.add('bad'); setTimeout(() => btn.classList.remove('bad'), 220); }
    }
  }

  function buildKeyboard(){
    keyboardEl.innerHTML = "";
    for (const rowStr of LAYOUT){
      const row = document.createElement('div');
      row.className = 'row';
      for (const k of rowStr.split('')){
        const btn = document.createElement('button');
        btn.className = 'key';
        btn.type = 'button';
        btn.textContent = k;
        btn.dataset.k = k;
        btn.addEventListener('click', () => {
          handleChar(k);
          hiddenInput.focus();
        });
        row.appendChild(btn);
      }
      keyboardEl.appendChild(row);
    }
  }

  // Events
  restartBtn.addEventListener('click', () => {
    overlay.style.display = "none";
    start();
  });
  pauseBtn.addEventListener('click', () => {
    if (overlay.style.display === "flex") return;
    togglePause();
  });

  tryAgainBtn.addEventListener('click', () => {
    overlay.style.display = "none";
    start();
  });

  // close if clicking outside modal
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.style.display = "none";
      start();
    }
  });

  // Real keyboard
  document.addEventListener('keydown', (e) => {
    // If popup is open: Enter / Escape restarts
    if (overlay.style.display === "flex") {
      if (e.key === 'Enter' || e.key === 'Escape') {
        overlay.style.display = "none";
        start();
      }
      return;
    }

    if (e.key === 'Escape') { start(); return; }
    if (e.key === ' ') { e.preventDefault(); togglePause(); return; }
    handleChar(e.key);
  });

  // Mobile keyboard typing (hidden input)
  hiddenInput.addEventListener('input', () => {
    const v = hiddenInput.value;
    if (!v) return;
    handleChar(v.slice(-1));
    hiddenInput.value = "";
  });

  // Tapping the stage focuses input on mobile
  document.getElementById('stage').addEventListener('click', () => hiddenInput.focus());

  // Init
  buildKeyboard();
  setLetter();
  setPauseIcon(false);
  timerEl.textContent = "0:00.00";
})();
</script>

</body>
</html>
